[customizations.installer.kickstart]
contents = """
# Kickstart for unattended installation with GNOME defaults

# Accept the EULA automatically
eula --agreed

# Clear all partitions
zerombr
clearpart --all --initlabel

# Standard UEFI requirement
reqpart

# Let Anaconda automatically configure the optimal Btrfs subvolume layout 
# natively designed for Fedora Silverblue/OSTree
autopart --type=btrfs

# Network - use DHCP
network --bootproto=dhcp --onboot=on --activate

# Root password (set to a strong password or use --lock to disable root login)
rootpw --lock

# Skip initial setup on first boot
firstboot --disable

# Reboot after installation
reboot
"""

[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage",
  "org.fedoraproject.Anaconda.Modules.Runtime",
  "org.fedoraproject.Anaconda.Modules.Payloads"
]
disable = [
  "org.fedoraproject.Anaconda.Modules.Network",
  "org.fedoraproject.Anaconda.Modules.Security",
  "org.fedoraproject.Anaconda.Modules.Services",
  "org.fedoraproject.Anaconda.Modules.Users",
  "org.fedoraproject.Anaconda.Modules.Subscription",
  "org.fedoraproject.Anaconda.Modules.Timezone",
  "org.fedoraproject.Anaconda.Modules.Localization"
]
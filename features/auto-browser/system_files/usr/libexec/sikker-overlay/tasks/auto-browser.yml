- name: Render Firefox autostart script
  when:
    - firefox_urls is defined
    - firefox_urls.urls is defined
    - firefox_urls.urls | length > 0

  block:

    - name: Ensure script directory exists
      ansible.builtin.file:
        path: "{{ output_root }}/usr/libexec"
        state: directory
        mode: "0755"

    - name: Write Firefox autostart script
      ansible.builtin.copy:
        dest: "{{ output_root }}/usr/libexec/open-browser.sh"
        mode: "0755"
        content: |
          #!/bin/bash

          # ==========================================
          # CONFIGURATION: Generated from Ansible YAML
          # ==========================================

          URLS=(
          {% for url in firefox_urls.urls %}
              "{{ url }}"
          {% endfor %}
          )

          # Wait for network
          echo "[+] Waiting for network connection..."
          while ! ping -c 1 -W 1 1.1.1.1 &>/dev/null; do
              sleep 1
          done

          # Launch Firefox
          echo "[+] Network up. Launching Firefox..."
          firefox "${URLS[@]}"
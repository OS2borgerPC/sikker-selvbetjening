---
- name: Render wallpaper
  when:
    - desktop is defined
    - (desktop.background_image_file | default('')) | length > 0
  block:
    - name: Resolve desktop background asset path
      ansible.builtin.set_fact:
        desktop_background_relpath: "{{ desktop.background_image_file | overlay_asset_relpath }}"

    - name: Ensure background destination directory exists
      ansible.builtin.file:
        path: "{{ output_root }}/usr/share/backgrounds/sikker-selvbetjening"
        state: directory
        mode: "0755"

    - name: Copy desktop background asset
      ansible.builtin.copy:
        src: "{{ assets_root }}/{{ desktop_background_relpath }}"
        dest: "{{ output_root }}/usr/share/backgrounds/sikker-selvbetjening/default-background"
        mode: "0644"

    - name: Ensure dconf defaults directory exists
      ansible.builtin.file:
        path: "{{ output_root }}/etc/dconf/db/local.d"
        state: directory
        mode: "0755"

    - name: Write desktop background defaults
      ansible.builtin.copy:
        dest: "{{ output_root }}/etc/dconf/db/local.d/03-desktop-background"
        mode: "0644"
        content: |
          [org/gnome/desktop/background]
          picture-uri='file:///usr/share/backgrounds/sikker-selvbetjening/default-background'
          picture-uri-dark='file:///usr/share/backgrounds/sikker-selvbetjening/default-background'
          picture-options='zoom'
          primary-color='#000000'
          secondary-color='#000000'
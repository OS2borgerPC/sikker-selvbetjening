---
- name: Configure Mesh Agent post-step
  when:
    - mesh_agent is defined
    - (mesh_agent.binary_download_command | default('')) | length > 0
  block:
    - name: Read post-steps configuration
      ansible.builtin.slurp:
        path: "{{ output_root }}/post-steps.json"
      register: post_steps_raw

    - name: Parse post-steps configuration
      ansible.builtin.set_fact:
        post_steps_doc: "{{ post_steps_raw.content | b64decode | from_json }}"
        mesh_agent_install_step:
          action: run
          command: /usr/bin/bash
          args:
            - -lc
            - |
              set -euo pipefail
              install -d -m 0755 /usr/libexec/meshagent

              mesh_agent_input="$1"

              # Accept markdown links copied from docs/UI: [label](https://...)
              if printf '%s' "$mesh_agent_input" | grep -Eq '^\[[^]]+\]\((https?://[^)]+)\)$'; then
                mesh_agent_input="$(printf '%s' "$mesh_agent_input" | sed -E 's|^\[[^]]+\]\((https?://[^)]+)\)$|\1|')"
              fi

              if printf '%s' "$mesh_agent_input" | grep -Eq '^https?://'; then
                if command -v curl >/dev/null 2>&1; then
                  curl -fL "$mesh_agent_input" -o /usr/libexec/meshagent/meshagent
                elif command -v wget >/dev/null 2>&1; then
                  wget -O /usr/libexec/meshagent/meshagent "$mesh_agent_input"
                else
                  echo "Neither curl nor wget is available for MeshAgent download" >&2
                  exit 1
                fi
              else
                eval "$mesh_agent_input"
              fi

              chmod 0755 /usr/libexec/meshagent/meshagent || true
            - --
            - "{{ mesh_agent.binary_download_command }}"

    - name: Add Mesh Agent install step when missing
      ansible.builtin.set_fact:
        post_steps_doc: "{{ post_steps_doc | combine({'steps': (post_steps_doc.steps | default([])) + [mesh_agent_install_step]}, recursive=True) }}"
      when: mesh_agent_install_step not in (post_steps_doc.steps | default([]))

    - name: Write post-steps configuration
      ansible.builtin.copy:
        dest: "{{ output_root }}/post-steps.json"
        mode: "0644"
        content: "{{ post_steps_doc | to_nice_json }}\n"
